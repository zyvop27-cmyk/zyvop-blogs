<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.10), 0 8px 24px rgba(0,0,0,.06);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
    }

    h1 { margin: 0 0 6px; font-size: 22px; }
    p.subtitle { margin: 0 0 28px; color: #666; font-size: 14px; }

    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }

    input[type="email"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
    }
    input[type="email"]:focus { border-color: #111; }

    button[type="submit"] {
      margin-top: 14px;
      width: 100%;
      padding: 11px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: background .15s;
    }
    button[type="submit"]:hover { background: #333; }
    button[type="submit"]:disabled { background: #999; cursor: not-allowed; }

    .message {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    .message.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .message.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .message.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <p class="subtitle">Enter your email and we'll send you a sign-in link. No password needed.</p>

    <form id="form">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
      <button type="submit" id="btn">Send sign-in link</button>
    </form>

    <div id="msg" class="message"></div>
  </div>

  <script>
    const ERRORS = {
      link_invalid: "That link has expired or already been used. Please request a new one.",
      default: "Something went wrong. Please try again."
    };

    // Show error from redirect query param (e.g. ?error=link_invalid)
    const params = new URLSearchParams(location.search);
    const errKey = params.get("error");
    if (errKey) showMsg(ERRORS[errKey] ?? ERRORS.default, "error");

    document.getElementById("form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const btn = document.getElementById("btn");

      btn.disabled = true;
      btn.textContent = "Sending…";

      try {
        const res = await fetch("/auth/request", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        const data = await res.json();

        if (res.ok) {
          showMsg("Check your inbox — a sign-in link is on its way.", "success");
          document.getElementById("form").style.display = "none";
        } else {
          showMsg(data.error ?? ERRORS.default, "error");
          btn.disabled = false;
          btn.textContent = "Send sign-in link";
        }
      } catch {
        showMsg(ERRORS.default, "error");
        btn.disabled = false;
        btn.textContent = "Send sign-in link";
      }
    });

    function showMsg(text, type) {
      const el = document.getElementById("msg");
      el.textContent = text;
      el.className = `message ${type} visible`;
    }
  </script>
</body>
</html>
